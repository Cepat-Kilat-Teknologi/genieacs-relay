        and don't trigger TR-069 RPCs. Wraps NBI `PUT /devices/{id}/tags/{tag}` and
        `DELETE /devices/{id}/tags/{tag}`. Tag names must match `[a-zA-Z0-9_-]{1,64}`.
      parameters:
      - description: Device IP address
        example: 192.168.1.1
        in: path
        name: ip
        required: true
        type: string
      - description: Tag operations
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/main.SetTagsRequest'
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            allOf:
            - $ref: '#/definitions/main.Response'
            - properties:
                data:
                  $ref: '#/definitions/main.SetTagsResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/main.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/main.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/main.Response'
        "429":
          description: Too Many Requests
          schema:
            $ref: '#/definitions/main.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/main.Response'
      security:
      - ApiKeyAuth: []
      summary: Add and remove GenieACS device tags
      tags:
      - Metadata
  /version:
    get:
      description: Returns binary build metadata (version, commit, build_time, api_version,
        uptime). Does not require authentication.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.VersionResponse'
      summary: Version info
      tags:
      - Health
  /wake/{ip}:
    post:
      description: Fires a TR-069 ConnectionRequest against the CPE without queuing
        any actual work. Used to wake a freshly-installed CPE so the first config
        push lands synchronously, wake an idle device for diagnostics, or probe responsiveness.
        Fire-and-forget — does NOT block waiting for the device to actually dial home.
        Typical wake takes 1-30 seconds.
      parameters:
      - description: Device IP address
        example: 192.168.1.1
        in: path
        name: ip
        required: true
        type: string
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            allOf:
            - $ref: '#/definitions/main.Response'
            - properties:
                data:
                  $ref: '#/definitions/main.MessageResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/main.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/main.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/main.Response'
        "429":
          description: Too Many Requests
          schema:
            $ref: '#/definitions/main.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/main.Response'
      security:
      - ApiKeyAuth: []
      summary: Wake CPE via TR-069 ConnectionRequest
      tags:
      - Lifecycle
  /wan/{ip}:
