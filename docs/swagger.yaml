      description: Returns WAN connection state(s) for the CPE — connection type (pppoe/dhcp/static),
        connection status, external IP, uptime, optional PPPoE username. Walks all
        WANDevice / WANConnectionDevice instances so multi-WAN devices are surfaced
        as separate entries.
      parameters:
      - description: Device IP address
        example: 192.168.1.1
        in: path
        name: ip
        required: true
        type: string
      produces:
