# golangci-lint configuration v2
# https://golangci-lint.run/usage/configuration/

version: "2"

run:
  timeout: 5m
  tests: false  # Skip test files

linters:
  default: none
  exclusions:
    generated: lax
    presets:
      - comments
    paths:
      - docs
      - vendor
    rules:
      - linters:
          - lll
        source: "^//go:generate "
  enable:
    # Default linters
    - errcheck       # Check for unchecked errors
    - govet          # Report suspicious constructs
    - ineffassign    # Detect ineffective assignments
    - staticcheck    # Static analysis checks (includes gosimple, stylecheck)
    - unused         # Check for unused code

    # Additional linters
    - bodyclose      # Check HTTP response body is closed
    - dogsled        # Check for too many blank identifiers
    - errname        # Check error naming convention
    - errorlint      # Find issues with error wrapping
    - exhaustive     # Check exhaustiveness of enum switch statements
    - copyloopvar    # Detect loop variable capture issues
    - goconst        # Find repeated strings that could be constants
    - gocritic       # Comprehensive Go source code linter
    - gocyclo        # Cyclomatic complexity checker
    - goprintffuncname # Check printf-like functions naming
    - gosec          # Security checker
    - misspell       # Check for misspelled words
    - nakedret       # Check for naked returns in large functions
    - nilerr         # Find code that returns nil error with non-nil error
    - noctx          # Check for http requests without context
    - prealloc       # Find slice preallocations
    - predeclared    # Find shadowed predeclared identifiers
    - revive         # Fast, configurable linter (replacement for golint)
    - unconvert      # Remove unnecessary conversions
    - whitespace     # Check for unnecessary whitespace

  settings:
    errcheck:
      check-type-assertions: true
      check-blank: false

    govet:
      enable-all: true
      disable:
        - fieldalignment

    gocyclo:
      min-complexity: 15

    goconst:
      min-len: 3
      min-occurrences: 3

    misspell:
      locale: US

    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
      disabled-checks:
        - hugeParam
        - rangeValCopy
        - unnamedResult

    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: increment-decrement
        - name: var-declaration
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: indent-error-flow
        - name: errorf
        - name: superfluous-else
        - name: unreachable-code

    staticcheck:
      checks: ["all", "-ST1000", "-ST1003", "-ST1016"]

    nakedret:
      max-func-lines: 30

    gosec:
      excludes:
        - G104
        - G304

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
