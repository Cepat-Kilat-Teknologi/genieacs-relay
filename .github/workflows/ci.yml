name: ci

on:
  push:
    branches: [ "main", "develop" ]
    tags: [ "v*.*.*" ]
  pull_request:
    branches: [ "main", "develop" ]
  workflow_dispatch:

env:
  # Docker Hub
  DOCKERHUB_REGISTRY: docker.io
  DOCKERHUB_IMAGE: cepatkilatteknologi/genieacs-relay
  # GitHub Packages
  GHCR_REGISTRY: ghcr.io
  GHCR_IMAGE: ghcr.io/${{ github.repository }}
  # Go version
  GO_VERSION: '1.26'

jobs:
  # ========================
  # Job 1: Lint, Test & Govulncheck
  # ========================
  test:
    name: Lint, Test & Govulncheck
    runs-on: ubuntu-latest
    environment: ci
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: go.sum

      - name: Download Go modules
        run: go mod download

      - name: Run Linter
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh | sh -s -- -b $(go env GOPATH)/bin v2.11.4
          golangci-lint run --timeout=5m --verbose

      - name: Run Govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Run Unit Tests with Coverage
        run: go test -v -race -coverprofile=coverage.out $(go list ./... | grep -v /docs)

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.out
          fail_ci_if_error: true

  # ========================
  # Job 2: Build & Push Docker Image
  # Only runs on main branch and version tags (not on develop)
  # ========================
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    environment: ci
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKERHUB_REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Login to GitHub Container Registry
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Extract metadata for Docker Hub
      - name: Extract metadata (Docker Hub)
        id: meta-dockerhub
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_REGISTRY }}/${{ env.DOCKERHUB_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=edge,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      # Extract metadata for GitHub Packages
      - name: Extract metadata (GitHub Packages)
        id: meta-ghcr
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.GHCR_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=edge,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      # Capture build metadata once for ldflags injection.
      - name: Compute build metadata
        id: meta-build
        env:
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
          GH_SHA: ${{ github.sha }}
        run: |
          echo "build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          # Prefer semver tag for APP_VERSION on tag builds, fall back to branch+sha.
          if [[ "$REF_TYPE" == "tag" ]]; then
            echo "app_version=${REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "app_version=${REF_NAME}-${GH_SHA:0:7}" >> "$GITHUB_OUTPUT"
          fi

      # Build and push to both registries
      - name: Build & Push Docker Image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: production
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: |
            ${{ steps.meta-dockerhub.outputs.tags }}
            ${{ steps.meta-ghcr.outputs.tags }}
          labels: ${{ steps.meta-dockerhub.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            APP_VERSION=${{ steps.meta-build.outputs.app_version }}
            APP_COMMIT=${{ github.sha }}
            APP_BUILD_TIME=${{ steps.meta-build.outputs.build_time }}

      # Compute a lowercase + tagged image ref for Trivy. Docker reference parsers
      # reject uppercase org names (e.g. Cepat-Kilat-Teknologi), so we force lower.
      - name: Compute Trivy image ref
        id: trivy-ref
        env:
          DH_IMAGE: ${{ env.DOCKERHUB_IMAGE }}
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
          REF: ${{ github.ref }}
        run: |
          lower_repo=$(echo "$DH_IMAGE" | tr '[:upper:]' '[:lower:]')
          if [[ "$REF_TYPE" == "tag" ]]; then
            tag="${REF_NAME#v}"
          elif [[ "$REF" == "refs/heads/main" ]]; then
            tag="edge"
          else
            tag="develop"
          fi
          echo "ref=${lower_repo}:${tag}" >> "$GITHUB_OUTPUT"

      # Trivy image scan (best-effort; fail the job only on CRITICAL/HIGH findings).
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.trivy-ref.outputs.ref }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true

      # SARIF upload is best-effort: repos without GitHub Advanced Security return
      # "Resource not accessible by integration". The scan itself still gates the
      # build above; this step is purely for Security tab ingestion when available.
      - name: Upload Trivy SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  # ========================
  # Job 3: Create GitHub Release (only on tags)
  # ========================
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-and-push
    if: startsWith(github.ref, 'refs/tags/')
    environment: ci
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Release Notes
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION_NUM="${VERSION#v}"

          cat > release_notes.md << 'NOTES_EOF'
          ## Docker Images

          **Docker Hub:**
          ```bash
          docker pull cepatkilatteknologi/genieacs-relay:VERSION_PLACEHOLDER
          docker pull cepatkilatteknologi/genieacs-relay:latest
          ```

          **GitHub Packages:**
          ```bash
          docker pull ghcr.io/cepat-kilat-teknologi/genieacs-relay:VERSION_PLACEHOLDER
          docker pull ghcr.io/cepat-kilat-teknologi/genieacs-relay:latest
          ```

          ## Deployment Options

          - **Docker Compose:** See `examples/docker/`
          - **Kubernetes:** See `examples/kubernetes/`
          - **Helm Chart:** Install from repository:
            ```bash
            helm repo add genieacs-relay https://cepat-kilat-teknologi.github.io/genieacs-relay
            helm repo update
            helm install my-relay genieacs-relay/genieacs-relay
            ```
          - **Systemd:** See `examples/systemd/`

          ## Documentation

          - [Installation Guide](INSTALLATION.md)
          - [API Reference](API_REFERENCE.md)
          - [Security](SECURITY.md)
          NOTES_EOF

          sed -i "s/VERSION_PLACEHOLDER/${VERSION_NUM}/g" release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
